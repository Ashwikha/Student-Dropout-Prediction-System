<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Upload Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div style="max-width: 600px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
        <h2>Bulk Upload Student Roster</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div style="color: green; font-weight: bold; margin-bottom: 15px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <p>Please select a CSV file containing your student records.</p>
        
        <form action="/upload-students" method="POST" enctype="multipart/form-data">
            <input type="file" name="student_file" accept=".csv" required style="margin-bottom: 20px; display: block;">
            <button type="submit" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                Upload and Import
            </button>
        </form>
        
        <br>
        <a href="/admin">← Back to Admin Dashboard</a>
    </div>
</body>
</html>
