<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            width: 450px;
            border-radius: 10px;
            box-shadow: 0px 2px 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>✏️ Edit Student</h1>

    <form method="POST">

        <label>Name</label>
        <input type="text" name="name" value="{{ student['name'] }}">

        <label>Roll No</label>
        <input type="text" name="rollno" value="{{ student['rollno'] }}">

        <label>Department</label>
        <input type="text" name="department" value="{{ student['department'] }}">

        <label>Year</label>
        <input type="number" name="year" value="{{ student['year'] }}">

        <label>Attendance (%)</label>
        <input type="number" step="0.1"
               name="attendance"
               value="{{ student['attendance'] }}">

        <label>CGPA</label>
        <input type="number" step="0.1"
               name="cgpa"
               value="{{ student['cgpa'] }}">

        <label>Backlogs</label>
        <input type="number"
               name="backlogs"
               value="{{ student['backlogs'] }}">

        <label>Internal Marks</label>
        <input type="number" step="0.1"
               name="internal_marks"
               value="{{ student['internal_marks'] }}">

        <label>Fee Paid</label>
        <select name="fee_paid">
            <option value="Yes" {% if student['fee_paid']=="Yes" %}selected{% endif %}>Yes</option>
            <option value="No" {% if student['fee_paid']=="No" %}selected{% endif %}>No</option>
        </select>

        <button type="submit">
            Update Student
        </button>

    </form>

    <a href="/admin" class="back-link">
        ⬅ Back to Dashboard
    </a>

</div>

</body>
</html>
